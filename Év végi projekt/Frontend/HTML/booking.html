<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/CSS/booking.css">
    <link rel="icon" href="/images/icon.jpg" type="image/png">
    <title>Foglalás - Slick Barber Shop</title>
</head>
<body id="dark-overlay">
    <script src="/JavaScript/users.js"></script>
        <main>
            <div class="container">
            <div class="booking-wrapper">
                <h1 class="text-center mb-5"> Foglalj Időpontot</h1>
                <div class="booking-steps">
                    
                    <!-- 1. Fodraszok kivalasztasa -->
                    <div class="booking-step" id="barbers"> 
                        <h2 class="step-title"> Válassz Fodrászt</h2>
                        <div class="barber-selection" id="barberContainer">
                        </div>
                    </div>

                    <!-- 2. Szolgaltatas kivalasztasa -->
                    <div class="booking-step">
                        <h2 class="step-title"> Válassz Szolgáltatást</h2>
                        <div class="service-selection" id="serviceContainer"></div>
                    </div>

                    <!-- 3. Naptar -->
                    <div class="booking-step" id="calendar-div">
                        <h2 class="step-title">Válassz Dátumot</h2>
                        <div class="calendar-wrapper">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <button class="btn btn-outline-light" id="prevMonth">&lt;</button>
                                <h4 id="monthYear" class="fw-bold mb-0"></h4>
                                <button class="btn btn-outline-light" id="nextMonth">&gt;</button>
                            </div>
                            <table class="table table-bordered text-center mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>H</th>
                                        <th>K</th>
                                        <th>Sze</th>
                                        <th>Cs</th>
                                        <th>P</th>
                                        <th>Szo</th>
                                        <th>V</th>
                                    </tr>
                                </thead>
                                <tbody id="calendarBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 4. Idopontok kivalasztasa -->
                    <div class="booking-step">
                        <h2 class="step-title">Válassz Időpontot</h2>
                        <p id="noSlotsMessage" class="text-center d-none" style="color: #d4af37; padding: 20px; border: 1px dashed #d4af37; border-radius: 10px;">
                            Sajnos ezen a napon nincs szabad időpont.
                        </p>
                        <div class="time-slot-wrapper"></div>
                    </div>
                    <!-- 5. Megjegyzes -->
                    <div class="booking-step">
                        <h2 class="step-title">Megjegyzés</h2>
                        <textarea id="commentInput" class="form-control" placeholder="Megjegyzés" maxlength="200"></textarea>
                    </div>
                    <!-- Foglalas gomb -->
                    <div class="text-center mt-5">
                        <button class="booking-btn button" id="finalBookingBtn"> Foglalás Megerősítése</button>
                    </div>
                </div>

                <!-- Vissza gomb -->
                <div class="text-center mt-4 mb-5">
                    <a href="/" class="back-btn">← Vissza a főoldalra</a>
                </div>
            </div>
        </main>
    <script src="/JavaScript/config.js"></script>
    <script src="/JavaScript/booking.js"></script>
</body>
</html>
