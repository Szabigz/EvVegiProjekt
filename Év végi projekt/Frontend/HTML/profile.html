<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/CSS/profile.css">
    <link rel="icon" href="/images/icon.jpg" type="image/png">
    <title>Profilom - Slick Barber Shop</title>
</head>
<body>
    <div class="container">
        <!-- Navigacio -->
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark mt-3 mb-4">
                <div class="container-fluid position-relative px-0">
                    
                    <!-- Logo kozepre rendezve mobilon, balra asztalin -->
                    <a class="navbar-brand mx-auto mx-lg-0" href="#">
                        <img src="/images/iconwithoutbg.jpg" alt="Slick Barber Shop" class="menu-img">
                    </a>
                    
                    <!-- Hamburger gomb (jobb szelen mobilon) -->
                    <button class="navbar-toggler position-absolute end-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    
                    <!-- Lenyilo menu pontok -->
                    <div class="collapse navbar-collapse justify-content-center mt-3 mt-lg-0" id="navbarNav">
                        <ul class="navbar-nav align-items-center text-center gap-2 gap-lg-4">
                            <li class="nav-item">
                                <a href="/#info-div" class="nav-link menu-link">Információ Rólunk</a>
                            </li>
                            <li class="nav-item">
                                <a href="/#works-div" class="nav-link menu-link">Munkáink</a>
                            </li>
                            <li class="nav-item">
                                <a href="/#prices-div" class="nav-link menu-link">Árak</a>
                            </li>
                            <li class="nav-item">
                                <a href="/#team-div" class="nav-link menu-link">Csapat</a>
                            </li>
                            <li class="nav-item">
                                <a href="/#location-div" class="nav-link menu-link">Hol találsz meg minket?</a>
                            </li>
                            <li class="nav-item mt-2 mt-lg-0">
                                <a href="/HTML/profile.html" class="nav-link menu-link profile-btn">
                                    <small>Profilod</small>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main>
            <!-- Profil -->
                <div id="profilediv">
                    <h1>Profilod adatai</h1>
                    <hr style="border-color: rgba(255,255,255,0.1);">
                    
                    <div class="row mt-4">
                        <div class="col-md-6 mb-3">
                            <label class="d-block small">Felhasználónév:</label>
                            <span id="display-name" class="fs-5">Betöltés...</span>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="d-block small">E-mail cím:</label>
                            <span id="display-email" class="fs-5">Betöltés...</span>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="d-block small text-white-50">Telefonszám:</label>
                            <div id="phone-container" class="d-flex align-items-center gap-2">
                                <span id="display-phone" class="fs-5">Betöltés...</span>
                                <small class="gold-text edit-link" onclick="editField('phone')" style="cursor:pointer;">(Módosítás)</small>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="d-block small text-white-50">Jelszó:</label>
                            <div id="password-container" class="d-flex align-items-center gap-2">
                                <span class="fs-5">********</span>
                                <small class="gold-text edit-link" onclick="editField('password')" style="cursor:pointer;">(Módosítás)</small>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top border-secondary">
                        <button id="logoutBtn" class="btn btn-sm">Kijelentkezés</button>
                        <button id="deleteUserBtn" class="btn btn-sm">Fiók törlése</button>
                    </div>
                </div>
                <!-- Foglalasok -->
                <div id="appointmentDiv" class="row mt-4"></div>
                <div class="back-btn-container col-12">
                    <a href="/" class="back-btn">← Vissza a főoldalra</a>
                </div>
            </div>
        </main>
    <script src="/JavaScript/config.js"></script>
    <script src="/JavaScript/profile.js"></script>
    <script src="/JavaScript/users.js"></script>
    <script src="/JavaScript/nav.js"></script>
</body>
</html>
